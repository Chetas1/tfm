name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gosec
        uses: securego/gosec@v2.26.1
        with:
          # G104: covered by golangci-lint errcheck (with curated exclusions).
          # G204/G702: shell commands derive from $SHELL env (user-controlled,
          #            local-only daemon — equivalent trust to ~/.profile).
          # G115: terminal rows/cols int->uint16 are bounded by tty size.
          args: '-no-fail -fmt sarif -out gosec.sarif -exclude=G104,G204,G702,G115 ./...'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  trivy:
    name: trivy-fs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy
